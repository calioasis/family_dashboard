<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f2f0ed;
    --border: #e8e4df;
    --text: #1a1917;
    --muted: #9b958d;
    --accent: #2d6a4f;
    --accent-light: #e8f4ef;
    --accent2: #b5451b;
    --ink: #3d3a36;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 20px 48px 0;
    flex-shrink: 0;
  }

  .date-block .weekday {
    font-family: 'Lora', serif;
    font-size: 2rem;
    font-weight: 400;
    line-height: 1;
  }
  .date-block .full-date {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .family-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .family-name {
    font-family: 'Lora', serif;
    font-size: 1.5rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    text-align: center;
    letter-spacing: 0.01em;
  }
  .family-subtitle {
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--accent2);
    text-align: center;
    letter-spacing: 0.01em;
  }

  .time-block {
    display: flex;
    align-items: baseline;
    justify-content: flex-end;
    gap: 6px;
  }
  .time-block .time {
    font-family: 'Lora', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--ink);
  }
  .time-block .ampm {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── WEATHER CARD ── */
  .weather-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .weather-current {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .wc-icon { font-size: 1.4rem; line-height: 1; }
  .wc-temp {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    font-weight: 400;
    line-height: 1;
    color: var(--ink);
  }
  .wc-desc {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 3px;
  }
  .hourly-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    min-height: 0;
  }
  .hour-item {
    display: grid;
    grid-template-columns: 44px 28px 1fr auto;
    align-items: center;
    padding: 9px 24px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .hour-item:last-child { border-bottom: none; }
  .hour-time { font-size: 0.8rem; color: var(--muted); }
  .hour-time.now { color: var(--ink); font-weight: 500; }
  .hour-icon { font-size: 1rem; text-align: center; }
  .hour-temp { font-size: 0.88rem; font-weight: 500; color: var(--ink); }
  .hour-precip { font-size: 0.72rem; color: #4a90c4; text-align: right; }

  /* ── RULE ── */
  .rule {
    margin: 16px 48px 16px;
    height: 1px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  .main {
    display: grid;
    grid-template-columns: 1.1fr 1fr 0.75fr;
    gap: 20px;
    padding: 0 48px 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .card-head {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .card-head h2 {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
  }
  .card-badge {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ── AGENDA ── */
  .agenda-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    min-height: 0;
  }

  .agenda-item {
    display: flex;
    align-items: flex-start;
    padding: 11px 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
    gap: 0;
  }
  .agenda-item:last-child { border-bottom: none; }
  .agenda-item.past { opacity: 0.35; }
  .agenda-item.current { background: var(--accent-light); }
  .agenda-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cal-color, var(--border));
    border-radius: 0 2px 2px 0;
  }

  .agenda-time-col {
    width: 72px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .t { font-size: 0.83rem; font-weight: 500; color: var(--ink); }
  .t2 { font-size: 0.71rem; color: var(--muted); margin-top: 1px; }
  .allday { font-size: 0.71rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  .agenda-body { flex: 1; }
  .agenda-title { font-size: 0.92rem; font-weight: 500; line-height: 1.3; }
  .agenda-loc { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

  /* ── UPCOMING ── */
  .upcoming-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    min-height: 0;
  }

  .upcoming-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 11px 24px;
    border-bottom: 1px solid var(--border);
  }
  .upcoming-item:last-child { border-bottom: none; }

  .cdown {
    width: 54px;
    flex-shrink: 0;
    text-align: center;
    padding: 6px 0;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .cdown .n {
    font-family: 'Lora', serif;
    font-size: 1.5rem;
    line-height: 1;
    color: var(--ink);
  }
  .cdown .lbl {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 1px;
  }
  .cdown.imminent { background: #fef3ee; border-color: #f5c8b4; }
  .cdown.imminent .n { color: var(--accent2); }
  .cdown.soon { background: var(--accent-light); border-color: #b2d8c7; }
  .cdown.soon .n { color: var(--accent); }

  .cal-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .upcoming-body { flex: 1; }
  .upcoming-title { font-size: 0.9rem; font-weight: 500; }
  .upcoming-date { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }

  /* ── EMPTY ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex: 1;
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    padding: 32px;
    text-align: center;
  }
  .empty-icon { font-size: 1.8rem; opacity: 0.45; }

  /* ── STATUS BAR ── */
  .statusbar {
    padding: 10px 48px 16px;
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 5px;
    vertical-align: middle;
  }
  .dot.loading { animation: blink 1s infinite; background: #c8a040; }
  .dot.err { background: var(--accent2); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }


  /* scrollbars */
  .agenda-scroll::-webkit-scrollbar,
  .upcoming-scroll::-webkit-scrollbar,
  .hourly-scroll::-webkit-scrollbar { width: 3px; }
  .agenda-scroll::-webkit-scrollbar-track,
  .upcoming-scroll::-webkit-scrollbar-track,
  .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
  .agenda-scroll::-webkit-scrollbar-thumb,
  .upcoming-scroll::-webkit-scrollbar-thumb,
  .hourly-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- DASHBOARD -->
<div class="topbar">
  <div class="date-block">
    <div class="weekday" id="weekday">—</div>
    <div class="full-date" id="fullDate">—</div>
  </div>
  <div class="family-center">
    <div class="family-name">Sherin Family</div>
    <div class="family-subtitle" id="familySubtitle"></div>
  </div>
  <div class="time-block">
    <div class="time" id="clockTime">—</div>
    <span class="ampm" id="clockAmpm">—</span>
  </div>
</div>

<div class="rule"></div>

<div class="main">
  <div class="card">
    <div class="card-head">
      <h2 id="agendaHeader">Today</h2>
      <span class="card-badge" id="agendaBadge">—</span>
    </div>
    <div class="agenda-scroll" id="agendaList">
      <div class="empty"><span class="empty-icon">📅</span>Loading…</div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Coming up</h2>
      <span class="card-badge">Next 30 days</span>
    </div>
    <div class="upcoming-scroll" id="upcomingList">
      <div class="empty"><span class="empty-icon">🗓</span>Loading…</div>
    </div>
  </div>

  <div class="card">
    <div class="card-head weather-card-head">
      <div>
        <div class="weather-current">
          <span class="wc-icon" id="wIcon">—</span>
          <span class="wc-temp" id="wTemp">—</span>
        </div>
        <div class="wc-desc" id="wDesc">Loading weather…</div>
      </div>
      <span class="card-badge" id="wHiLow"></span>
    </div>
    <div class="hourly-scroll" id="wHourly">
      <div class="empty">Loading…</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div><span class="dot loading" id="statusDot"></span><span id="statusText">Starting up…</span></div>
  <div id="statusRight">—</div>
</div>

<script>
const CORS = 'https://calendar-proxy.jeffrey-sherin.workers.dev/?url=';
const SUBTITLE = 'Gaga Shell and Papa Ron here Thursday!!';

let cfg = null;
let allEvents = [];
let showingTomorrow = false;

// ── PAGE RELOAD every 60 minutes ──
setTimeout(() => location.reload(), 60 * 60 * 1000);

// ── SUBTITLE ──
if (SUBTITLE) document.getElementById('familySubtitle').textContent = SUBTITLE;

// ── CLOCK ──
function tick() {
  const now = new Date();
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('weekday').textContent = DAYS[now.getDay()];
  document.getElementById('fullDate').textContent = `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  let h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clockTime').textContent = `${h}:${String(m).padStart(2,'0')}`;
  document.getElementById('clockAmpm').textContent = ap;
}
setInterval(tick, 1000);
tick();

// ── WEATHER ──
async function fetchWeather(city) {
  try {
    const cityName = city.split(',')[0].trim();
    const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1`);
    const gj = await g.json();
    if (!gj.results?.length) return;
    const { latitude: lat, longitude: lon } = gj.results[0];
    const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m&hourly=temperature_2m,weathercode,precipitation_probability&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=2&timezone=auto`);
    const wj = await w.json();
    const cur = wj.current, day = wj.daily, hourly = wj.hourly;

    document.getElementById('wIcon').textContent = wmoIcon(cur.weathercode);
    document.getElementById('wTemp').textContent = `${Math.round(cur.temperature_2m)}°`;
    document.getElementById('wDesc').textContent = wmoDesc(cur.weathercode);
    document.getElementById('wHiLow').textContent = `H: ${Math.round(day.temperature_2m_max[0])}°  L: ${Math.round(day.temperature_2m_min[0])}°`;

    const now = new Date();
    const cutoff = new Date(now.getTime() + 12 * 3600000);
    const hours = hourly.time
      .map((t, i) => ({ d: new Date(t), i }))
      .filter(({ d }) => d >= now && d <= cutoff);

    document.getElementById('wHourly').innerHTML = hours.map(({ d, i }) => {
      let h = d.getHours();
      const ap = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      const isNow = d.getHours() === now.getHours();
      const timeStr = isNow ? 'Now' : `${h} ${ap}`;
      const precip = hourly.precipitation_probability[i];
      return `<div class="hour-item">
        <div class="hour-time${isNow ? ' now' : ''}">${timeStr}</div>
        <div class="hour-icon">${wmoIcon(hourly.weathercode[i])}</div>
        <div class="hour-temp">${Math.round(hourly.temperature_2m[i])}°</div>
        <div class="hour-precip">${precip > 10 ? precip + '%' : ''}</div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('wDesc').textContent = 'Weather unavailable';
  }
}

function wmoIcon(c) {
  if (c===0) return '☀️';
  if (c<=2) return '⛅';
  if (c<=3) return '☁️';
  if (c<=49) return '🌫';
  if (c<=59) return '🌦';
  if (c<=69) return '🌧';
  if (c<=79) return '🌨';
  if (c<=84) return '🌧';
  if (c<=99) return '⛈';
  return '🌡';
}
function wmoDesc(c) {
  if (c===0) return 'Clear';
  if (c<=2) return 'Partly Cloudy';
  if (c<=3) return 'Overcast';
  if (c<=49) return 'Foggy';
  if (c<=59) return 'Drizzle';
  if (c<=69) return 'Rain';
  if (c<=79) return 'Snow';
  if (c<=84) return 'Rain Showers';
  if (c<=99) return 'Thunderstorms';
  return 'Unknown';
}

// ── ICS PARSER ──
function parseICS(text) {
  const evts = [];
  const lines = text.replace(/\r\n /g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  let e = null;
  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { e = {}; continue; }
    if (line === 'END:VEVENT') { if (e?.summary) evts.push(e); e = null; continue; }
    if (!e) continue;
    const ci = line.indexOf(':');
    if (ci < 0) continue;
    const key = line.slice(0, ci).split(';')[0].toUpperCase();
    const val = line.slice(ci + 1).trim();
    if (key === 'SUMMARY') e.summary = val.replace(/\\n/g,' ').replace(/\\,/g,',').replace(/\\;/g,';');
    else if (key === 'DTSTART') e.start = parseICSDate(val, line);
    else if (key === 'DTEND') e.end = parseICSDate(val, line);
    else if (key === 'LOCATION') e.location = val.replace(/\\n/g,' ').replace(/\\,/g,',');
  }
  return evts;
}

function parseICSDate(val, rawLine) {
  const allDay = rawLine.includes('VALUE=DATE') || /^\d{8}$/.test(val);
  val = val.replace(/^[^:]*:/,'');
  if (allDay || /^\d{8}$/.test(val)) {
    const d = new Date(+val.slice(0,4), +val.slice(4,6)-1, +val.slice(6,8));
    d.allDay = true;
    return d;
  }
  if (val.endsWith('Z')) {
    return new Date(Date.UTC(+val.slice(0,4), +val.slice(4,6)-1, +val.slice(6,8), +val.slice(9,11), +val.slice(11,13), +val.slice(13,15)));
  }
  return new Date(+val.slice(0,4), +val.slice(4,6)-1, +val.slice(6,8), +val.slice(9,11), +val.slice(11,13), +val.slice(13,15));
}

// ── FETCH ──
async function fetchCalendar(url, color) {
  url = url.replace(/^webcal:\/\//i, 'https://');
  try {
    const res = await fetch(CORS + encodeURIComponent(url));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    return parseICS(text).map(e => ({ ...e, color }));
  } catch(e) {
    console.warn('Calendar fetch failed:', e);
    return null;
  }
}

// ── HELPERS ──
function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function fmtTime(dt) {
  if (!dt || dt.allDay) return null;
  let h = dt.getHours(), m = dt.getMinutes();
  const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── RENDER AGENDA ──
function renderAgenda(events) {
  const now = new Date();
  const today = events.filter(e => e.start && sameDay(e.start, now));
  today.sort((a,b) => {
    if (a.start.allDay && !b.start.allDay) return -1;
    if (!a.start.allDay && b.start.allDay) return 1;
    return a.start - b.start;
  });

  const allPast = today.length === 0 || today.every(e => !e.start.allDay && e.end && e.end < now);
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);

  let displayEvents = today;
  if (allPast) {
    showingTomorrow = true;
    displayEvents = events.filter(e => e.start && sameDay(e.start, tomorrow));
    displayEvents.sort((a,b) => {
      if (a.start.allDay && !b.start.allDay) return -1;
      if (!a.start.allDay && b.start.allDay) return 1;
      return a.start - b.start;
    });
  } else {
    showingTomorrow = false;
  }

  document.getElementById('agendaHeader').textContent = showingTomorrow ? 'Tomorrow' : 'Today';
  document.getElementById('agendaBadge').textContent = `${displayEvents.length} event${displayEvents.length!==1?'s':''}`;
  const el = document.getElementById('agendaList');

  if (!displayEvents.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">${showingTomorrow ? '😴' : '🎉'}</span>Nothing scheduled ${showingTomorrow ? 'tomorrow' : 'today'}</div>`;
    return;
  }

  el.innerHTML = displayEvents.map(evt => {
    const past = !showingTomorrow && !evt.start.allDay && evt.end && evt.end < now;
    const current = !showingTomorrow && !evt.start.allDay && evt.start <= now && (!evt.end || evt.end >= now);
    const cls = past ? 'past' : current ? 'current' : '';
    const t1 = fmtTime(evt.start);
    const t2 = fmtTime(evt.end);
    const timeHTML = t1
      ? `<div class="t">${t1}</div>${t2 ? `<div class="t2">${t2}</div>` : ''}`
      : `<div class="allday">All day</div>`;
    return `<div class="agenda-item ${cls}" style="--cal-color: ${evt.color || 'var(--border)'}">
      <div class="agenda-time-col">${timeHTML}</div>
      <div class="agenda-body">
        <div class="agenda-title">${evt.summary}</div>
        ${evt.location ? `<div class="agenda-loc">📍 ${evt.location}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── RENDER UPCOMING ──
function renderUpcoming(events) {
  const now = new Date();
  const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() + 30);

  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
  const upcoming = events
    .filter(e => {
      if (!e.start || e.start <= now || sameDay(e.start, now) || e.start > cutoff) return false;
      if (showingTomorrow && sameDay(e.start, tomorrow)) return false;
      return true;
    })
    .sort((a,b) => a.start - b.start)
    .slice(0, 14);

  const el = document.getElementById('upcomingList');
  if (!upcoming.length) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">😌</span>Nothing in the next 30 days</div>';
    return;
  }

  el.innerHTML = upcoming.map(evt => {
    const msPerDay = 86400000;
    const days = Math.ceil((evt.start - now) / msPerDay);
    const cls = days <= 1 ? 'imminent' : days <= 5 ? 'soon' : '';
    const dateStr = `${DAY_SHORT[evt.start.getDay()]}, ${MON_SHORT[evt.start.getMonth()]} ${evt.start.getDate()}`;
    const t = fmtTime(evt.start);
    return `<div class="upcoming-item">
      <div class="cdown ${cls}">
        <div class="n">${evt.start.getDate()}</div>
        <div class="lbl">${DAY_SHORT[evt.start.getDay()]}</div>
      </div>
      <div class="upcoming-body">
        <div class="upcoming-title"><span class="cal-dot" style="background:${evt.color || 'var(--border)'}"></span>${evt.summary}</div>
        <div class="upcoming-date">${dateStr}${t ? ' · ' + t : ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── STATUS ──
function setStatus(type, msg, right) {
  const dot = document.getElementById('statusDot');
  dot.className = 'dot ' + (type || '');
  document.getElementById('statusText').textContent = msg;
  if (right !== undefined) document.getElementById('statusRight').textContent = right;
}

// ── LOAD CALENDARS ──
async function loadCalendars() {
  if (!cfg?.calendars?.length) return;
  setStatus('loading', 'Fetching calendars…');
  const results = await Promise.all(cfg.calendars.map(cal => fetchCalendar(cal.url, cal.color)));
  const succeeded = results.filter(Boolean);
  if (!succeeded.length) {
    setStatus('err', 'Could not load calendars — will retry in 15 min');
    return;
  }
  const now = new Date();
  const past = new Date(now); past.setDate(past.getDate() - 1);
  const future = new Date(now); future.setDate(future.getDate() + 60);
  allEvents = succeeded.flat().filter(e => e.start && e.start >= past && e.start <= future);
  renderAgenda(allEvents);
  renderUpcoming(allEvents);
  setStatus('', `Live · ${allEvents.length} events`, `Updated ${now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}`);
}


function init() {
  if (cfg.city) fetchWeather(cfg.city);
  loadCalendars();
  // Refresh calendar data every 15 minutes
  setInterval(loadCalendars, 15 * 60 * 1000);
  // Refresh weather every 30 minutes
  if (cfg.city) setInterval(() => fetchWeather(cfg.city), 30 * 60 * 1000);
}
